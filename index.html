<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Team Sheet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;touch-action:none}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;touch-action:none;-webkit-touch-callout:none;}

  html,body{height:100%;overflow:hidden;font-family:'Barlow Condensed',sans-serif;background:#051b43;}

  #app{
    height:100dvh; width:100vw; position:relative; overflow:hidden;
    background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 20%, rgba(0,0,0,0.6) 100%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.04) 0px, rgba(255,255,255,0.04) 2px, transparent 2px, transparent 14px),
                #073175;
    display:flex; align-items:center; justify-content:center;
    padding:10px;
  }

  /* ── Sliding track ── */
  #boardTrackWrapper{
    position:relative;
    width:100%; max-width:500px;
    height:100%; max-height:900px;
    overflow:visible;
    clip-path:inset(0 0 0 0);
    transform:translateY(5%);
    transition:transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94), clip-path 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  #boardTrack{
    display:flex; flex-direction:row;
    height:100%; width:100%;
    will-change:transform;
  }
  .ground{
    flex:0 0 auto;
    position:relative;
    height:100%;
    overflow:visible; 
  }
  .ground svg.bg{position:absolute;inset:0;width:100%;height:100%;z-index:1;}

  /* ── Zone labels ── */
  .zone-label{position:absolute;left:50%;transform:translateX(-50%);font-family:'Bebas Neue',sans-serif;font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:3px;pointer-events:none;text-transform:uppercase;z-index:2}
  .zone-label.field-zone{font-size:14px;letter-spacing:4px;}
  .zone-label.right-aligned{left:auto;right:5%;transform:none;text-align:right;}
  .divider{position:absolute;left:5%;width:90%;height:1px;background:rgba(255,255,255,0.1);z-index:2;pointer-events:none}

  /* ── Position slots & magnets ── */
  .pos-slot,.magnet{position:absolute;transform:translate(calc(-50% + 5px),-50%);z-index:3;width:70px;height:20px;border-radius:2px;}
  .pos-slot{width:80px;transform:translate(-50%,-50%);border:1px dashed rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,0.01);}
  .pos-slot .pos-label{font-size:8px;color:rgba(255,255,255,0.2);text-transform:uppercase;font-weight:bold;line-height:1;display:block;text-align:center;}
  .pos-slot.filled{border:none;background:transparent;pointer-events:none}
  .magnet{z-index:50;background:#fff;color:#073175;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;display:flex;align-items:center;padding:0 4px 0 16px;cursor:grab;box-shadow:0 2px 6px rgba(0,0,0,0.3);white-space:nowrap;transition:color 0.2s ease;}
  .magnet.warning{color:#b00000!important;}
  .mag-name{width:100%;text-align:left;overflow:hidden;text-overflow:ellipsis;}
  .magnet.is-bench{width:60px!important;font-size:12px!important;padding:0 2px 0 12px!important;}
  .pos-slot.is-bench{width:70px!important;padding:0 !important;}
  .mag-badge{position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:22px;height:22px;background:#6786b8;border-radius:50%;border:1.5px solid #fff;display:flex;justify-content:center;align-items:center;color:#fff;font-weight:700;box-shadow:1px 0 3px rgba(0,0,0,0.1);line-height:1;}

  /* ── Edge carry indicators ── */
  .edge-indicator{
    position:fixed;top:0;bottom:0;width:48px;z-index:60;pointer-events:none;
    opacity:0;transition:opacity 0.2s ease;
    display:flex;align-items:center;
  }
  #edgeIndicatorRight{
    right:0;
    background:linear-gradient(to left, rgba(96,165,250,0.35), transparent);
    justify-content:flex-end;padding-right:6px;
  }
  #edgeIndicatorLeft{
    left:0;
    background:linear-gradient(to right, rgba(96,165,250,0.35), transparent);
    justify-content:flex-start;padding-left:6px;
  }
  .edge-indicator.show{opacity:1;}
  .edge-indicator::after{content:'›';font-size:28px;color:rgba(255,255,255,0.7);font-family:'Bebas Neue',sans-serif;}
  #edgeIndicatorLeft::after{content:'‹';}

  /* ── Toast Messages ── */
  #toastOverlay{
    position:fixed; inset:0; z-index:1000;
    pointer-events:none; display:flex; align-items:center; justify-content:center;
  }
  .toast-msg{
    font-family:'Bebas Neue',sans-serif; font-size:42px; letter-spacing:4px;
    color:#ff4444; text-shadow:0 4px 12px rgba(0,0,0,0.5);
    opacity:0; transform:scale(0.8); transition:all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .toast-msg.show{ opacity:1; transform:scale(1); }

  /* ── Password Overlay ── */
  #pwOverlay{
    display:none; position:fixed; inset:0; z-index:2000; 
    background:#051b43; align-items:center; justify-content:center; 
    flex-direction:column; gap:16px;
  }
  #pwOverlay.show{display:flex;}
  #pwOverlay .pw-box{
    background:#0f1f3d; padding:30px; border-radius:12px; 
    border:1px solid rgba(255,255,255,0.1); display:flex; 
    flex-direction:column; gap:16px; width:260px;
  }
  #pwOverlay input{
    height:44px; background:#1a2f55; border:1px solid rgba(255,255,255,0.2); 
    color:#fff; border-radius:6px; padding:0 12px; text-align:center; font-size:18px;
    outline:none;
    touch-action:auto;-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;
  }
  #pwOverlay button{
    height:40px; background:#3b82f6; color:#fff; border:none; 
    border-radius:6px; font-family:'Barlow Condensed',sans-serif; 
    font-weight:700; cursor:pointer; letter-spacing:1px;
  }

  /* ── Mode Badge ── */
  #modeBadge{position:absolute; top:32px; left:50%; transform:translateX(-50%); font-size:9px; color:rgba(255,255,255,0.4); letter-spacing:2px; z-index:101; text-transform:uppercase; pointer-events:none;}

  /* ── Top bar ── */
  #topBar{position:absolute;top:10px;left:10px;right:10px;z-index:100;display:flex;align-items:center;justify-content:space-between;}
  #menuBtn{background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);color:#aaa;font-size:15px;width:32px;height:28px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
  #activeBoardName{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:'Bebas Neue',sans-serif;font-size:26px;color:rgba(255,255,255,0.35);letter-spacing:3px;pointer-events:none;white-space:nowrap;}
  #refreshBtn{background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);color:#aaa;font-family:'Barlow Condensed',sans-serif;font-size:10px;padding:3px 7px;border-radius:4px;cursor:pointer;height:28px;}

  /* ── Sync & indicators ── */
  #syncStatus{position:absolute;bottom:10px;right:28px;z-index:100;font-size:9px;color:rgba(255,255,255,0.3);}
  #boardIndicator{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:7px;align-items:center;}
  .board-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2);transition:background 0.2s,transform 0.2s;}
  .board-dot.active{background:rgba(255,255,255,0.75);transform:scale(1.4);}

  /* ── Board menu ── */
  #boardMenuOverlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.5);}
  #boardMenuOverlay.open{display:block;}
  #boardMenu{position:fixed;top:0;left:0;bottom:0;z-index:201;width:240px;background:#0f1f3d;border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform 0.25s ease;padding:0 0 20px 0;}
  #boardMenu.open{transform:translateX(0);}
  #boardMenuTitle{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:rgba(255,255,255,0.5);padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,0.08);}
  #createBoardBtn{margin:12px 12px 4px;height:36px;border:1px dashed rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.5);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
  #createBoardBtn:active{background:rgba(255,255,255,0.05);}
  #newBoardForm{display:none;margin:4px 12px 8px;gap:6px;align-items:center;}
  #newBoardForm.show{display:flex;}
  #newBoardInput{flex:1;height:34px;background:#1a2f55;border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:6px;padding:0 10px;font-family:'Barlow Condensed',sans-serif;font-size:14px;outline:none;touch-action:auto;-webkit-user-select:text;user-select:text;}
  #newBoardInput{flex:1;height:34px;background:#1a2f55;border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:6px;padding:0 10px;font-family:'Barlow Condensed',sans-serif;font-size:14px;outline:none;touch-action:auto;-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;}
  #newBoardInput:focus{border-color:#60a5fa;}
  #newBoardConfirm{width:34px;height:34px;background:#3b82f6;border:none;border-radius:6px;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  #boardList{flex:1;overflow-y:auto;padding:4px 12px 0;display:flex;flex-direction:column;gap:6px;}
  .board-item{height:40px;border-radius:6px;padding:0 12px;display:flex;align-items:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.04);cursor:pointer;border:1px solid transparent;letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .board-item:active{background:rgba(255,255,255,0.1);}
  .board-item.active{background:rgba(96,165,250,0.15);color:#60a5fa;border-color:rgba(96,165,250,0.3);}

  /* ── Edit overlay ── */
  #editOverlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;backdrop-filter:blur(3px);}
  #editOverlay.show{display:flex;}
  @media(pointer:coarse){#editOverlay.show{align-items:flex-start;padding-top:60px;}}
  #editBox{background:#111827;border-radius:12px;padding:20px;width:280px;display:flex;flex-direction:column;gap:12px;border:1px solid #374151}
  #editBox .edit-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#60a5fa;letter-spacing:2px}
  #editBox label{font-size:10px;color:#9ca3af;font-weight:bold;margin-bottom:-8px;letter-spacing:1px;}
  #editBox input{height:44px;border:none;border-radius:8px;background:#1f2937;color:#fff;padding:0 14px;font-size:16px;outline:none;touch-action:auto;-webkit-user-select:text;user-select:text;}
  #editBox input{height:44px;border:none;border-radius:8px;background:#1f2937;color:#fff;padding:0 14px;font-size:16px;outline:none;touch-action:auto;-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;}
  #editBox input:focus{box-shadow:0 0 0 2px #60a5fa}
  #editBox .btn-row{display:flex;gap:8px;margin-top:10px;}
  #editBox button{flex:1;height:40px;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;cursor:pointer;}
  #editBox .save-btn{background:#3b82f6;color:#fff}
  #editBox .clear-btn{background:#374151;color:#fff}

  /* ── Inventory ── */
  #inventoryPanel{
    position:absolute;bottom:0;left:0;right:0;
    height:30dvh;z-index:50;overflow:hidden;
    background:
      rgba(0,0,0,0.28),
      repeating-linear-gradient(45deg,rgba(255,255,255,0.04) 0px,rgba(255,255,255,0.04) 2px,transparent 2px,transparent 14px),
      #073175;
    border-top:1px solid rgba(255,255,255,0.14);
    transform:translateY(100%);
    transition:transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  #inventoryPanel.open{transform:translateY(0);}
  #inventoryLabel{position:absolute;top:4px;left:50%;transform:translateX(-50%);font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.2);pointer-events:none;}
  .inv-slot{
    position:absolute;transform:translate(-50%,-50%);
    width:70px;height:20px;border-radius:2px;
    border:1px dashed rgba(255,255,255,0.15);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;background:rgba(255,255,255,0.01);
  }
  .inv-slot .pos-label{font-size:8px;color:rgba(255,255,255,0.2);text-transform:uppercase;font-weight:bold;line-height:1;display:block;text-align:center;}
  .inv-slot.filled{border:none;background:transparent;pointer-events:none;}
  /* Chevron arrows */
  .inv-arrows{
    position:absolute;left:8%;right:8%;top:91.5%;
    display:flex;justify-content:space-between;z-index:20;
    cursor:pointer;color:rgba(255,255,255,0.28);
    pointer-events:auto;user-select:none;touch-action:none;
    align-items:center;padding:8px 0;
  }
  .inv-arrows span{
    display:inline-block;width:9px;height:9px;
    border-right:1.5px solid currentColor;
    border-bottom:1.5px solid currentColor;
    transform:rotate(45deg);
    transition:transform 0.3s ease,color 0.2s;
  }
  .inv-arrows.open span{transform:rotate(-135deg);color:rgba(96,165,250,0.75);}

  /* ── No UI Mode ── */
  body.no-ui #topBar,
  body.no-ui #boardIndicator,
  body.no-ui #syncStatus,
  body.no-ui .inv-arrows,
  body.no-ui .edge-indicator {
    display: none !important;
  }
</style>
</head>
<body>
<div id="app">
  <div id="topBar">
    <button id="menuBtn">&#9776;</button>
    <div id="activeBoardName"></div>
    <div id="modeBadge"></div>
    <button id="refreshBtn">↻ REFRESH</button>
  </div>
  <div id="boardTrackWrapper">
    <div id="boardTrack"></div>
  </div>
  <!-- Indicators -->
  <div id="edgeIndicatorRight" class="edge-indicator"></div>
  <div id="edgeIndicatorLeft" class="edge-indicator"></div>
  <div id="boardIndicator"></div>
  <div id="syncStatus"></div>

  <!-- Global Message Overlay -->
  <div id="toastOverlay"></div>
  <!-- Inventory panel -->
  <div id="inventoryPanel"><div id="inventoryLabel">EXTRA BENCH</div></div>
</div>

<!-- Password Overlay -->
<div id="pwOverlay">
  <div class="pw-box">
    <div style="font-family:'Bebas Neue',sans-serif; font-size:20px; color:#60a5fa; letter-spacing:2px; text-align:center;">COACH ACCESS</div>
    <input type="password" id="pwInput" placeholder="Password...">
    <button id="pwSubmit">LOGIN</button>
  </div>
</div>

<!-- Board menu -->
<div id="boardMenuOverlay"></div>
<div id="boardMenu">
  <div id="boardMenuTitle">BOARDS</div>
  <button id="createBoardBtn">+ CREATE NEW</button>
  <div id="newBoardForm">
    <input id="newBoardInput" type="text" placeholder="Board name…" maxlength="30" autocomplete="off"/>
    <button id="newBoardConfirm">✓</button>
  </div>
  <div id="boardList"></div>
</div>

<!-- Edit overlay -->
<div id="editOverlay">
  <div id="editBox">
    <div class="edit-title" id="editTitle">POS</div>
    <label>PLAYER NAME</label>
    <input id="editInput" type="text" placeholder="Name…" autocomplete="off"/>
    <label>BADGE (C, 10, 🇮🇪)</label>
    <input id="badgeInput" type="text" placeholder="C, 10, 🇮🇪…" autocomplete="off"/>
    <div class="btn-row">
      <button class="save-btn" id="editSave">SAVE</button>
      <button class="clear-btn" id="editClear">DELETE</button>
      <button id="editCancel" style="background:transparent;color:#6b7280;">✕</button>
    </div>
  </div>
</div>

<script>
// ── GLOBALS & STATE ──
const urlParams = new URLSearchParams(window.location.search);
let isViewOnly = urlParams.has('view'); 
let isDemo = urlParams.has('demo');     
let isEdit = urlParams.has('edit'); 
let isNoUI = urlParams.has('noUI'); 

const BIN_ID='69de398f856a68218931e5ea';
const API_KEY='$2a$10$pzhEn9dwvvZP9ycmWjqIqOxQXIwhs.wWSOnj6BZv5SltQmU.XKXR6';
const JSONBIN_URL=`https://api.jsonbin.io/v3/b/${BIN_ID}`;

const syncStatus=document.getElementById('syncStatus'),
      refreshBtn=document.getElementById('refreshBtn'),
      wrapper=document.getElementById('boardTrackWrapper'),
      boardTrack=document.getElementById('boardTrack'),
      edgeIndicatorRight=document.getElementById('edgeIndicatorRight'),
      edgeIndicatorLeft=document.getElementById('edgeIndicatorLeft'),
      toastOverlay=document.getElementById('toastOverlay'),
      overlay=document.getElementById('editOverlay'),
      editTitle=document.getElementById('editTitle'),
      editInput=document.getElementById('editInput'),
      badgeInput=document.getElementById('badgeInput'),
      editSave=document.getElementById('editSave'),
      editClear=document.getElementById('editClear'),
      editCancel=document.getElementById('editCancel'),
      menuBtn=document.getElementById('menuBtn'),
      boardMenuOverlay=document.getElementById('boardMenuOverlay'),
      boardMenuEl=document.getElementById('boardMenu'),
      activeBoardNameEl=document.getElementById('activeBoardName'),
      createBoardBtn=document.getElementById('createBoardBtn'),
      newBoardForm=document.getElementById('newBoardForm'),
      newBoardInput=document.getElementById('newBoardInput'),
      newBoardConfirm=document.getElementById('newBoardConfirm'),
      boardListEl=document.getElementById('boardList'),
      modeBadge=document.getElementById('modeBadge'),
      pwOverlay=document.getElementById('pwOverlay'),
      pwInput=document.getElementById('pwInput'),
      pwSubmit=document.getElementById('pwSubmit');

const positions=[
  {id:'fpl',x:22,y:6,label:'FP'},{id:'ff',x:50,y:4,label:'FF'},{id:'fpr',x:78,y:6,label:'FP'},
  {id:'hfl',x:18,y:17,label:'HF'},{id:'chf',x:50,y:15,label:'CHF'},{id:'hfr',x:82,y:17,label:'HF'},
  {id:'lw',x:12,y:32,label:'LW'},{id:'ml',x:26,y:36,label:'MID'},
  {id:'c',x:50,y:28,label:'C'},{id:'rk',x:50,y:46,label:'RK'},
  {id:'mr',x:74,y:36,label:'MID'},{id:'rw',x:88,y:32,label:'RW'},
  {id:'hbl',x:18,y:59,label:'HB'},{id:'chb',x:50,y:61,label:'CHB'},{id:'hbr',x:82,y:59,label:'HB'},
  {id:'bpl',x:22,y:70,label:'BP'},{id:'fb',x:50,y:72,label:'FB'},{id:'bpr',x:78,y:70,label:'BP'},
  {id:'ic1',x:10,y:80,label:'IC',bench:true},{id:'ic2',x:30,y:80,label:'IC',bench:true},
  {id:'ic3',x:50,y:80,label:'IC',bench:true},{id:'ic4',x:70,y:80,label:'IC',bench:true},
  {id:'emg',x:90,y:80,label:'EMG',bench:true},
  {id:'e1',x:10,y:84,label:'---',bench:true},{id:'e2',x:30,y:84,label:'---',bench:true},{id:'e3',x:50,y:84,label:'---',bench:true},{id:'e4',x:70,y:84,label:'---',bench:true},{id:'e5',x:90,y:84,label:'---',bench:true},
  {id:'e6',x:10,y:87,label:'---',bench:true},{id:'e7',x:30,y:87,label:'---',bench:true},{id:'e8',x:50,y:87,label:'---',bench:true},{id:'e9',x:70,y:87,label:'---',bench:true},{id:'e10',x:90,y:87,label:'---',bench:true},
  {id:'e11',x:10,y:90,label:'---',bench:true},{id:'e12',x:30,y:90,label:'---',bench:true},{id:'e13',x:50,y:90,label:'---',bench:true},{id:'e14',x:70,y:90,label:'---',bench:true},{id:'e15',x:90,y:90,label:'---',bench:true},
];
const zones=[{label:'FORWARD',y:9.5},{label:'MIDFIELD',y:31},{label:'DEFENCE',y:66}];

let allData={boards:{}};
let currentBoardId=null;
let currentBoardIndex=0;
let roster={};
let saveTimer=null,editingPosId=null,dragState=null,suppressClick=false;
let autoRefreshInterval=null;
let isDirty=false;
let isSaving=false;
let inventoryOpen=false;
const INV_COLS=[10,30,50,70,90];
const INV_ROWS=[13,25,37,49,61,73,85];
const inventorySlots=[];
for(let r=0;r<INV_ROWS.length;r++) for(let c=0;c<INV_COLS.length;c++) inventorySlots.push({id:`inv${r*5+c}`,x:INV_COLS[c],y:INV_ROWS[r]});

// ── PREVENT NATIVE LONG-PRESS/VIBRATE ──
document.addEventListener('contextmenu', e => { if (e.target.tagName !== 'INPUT') e.preventDefault(); });

// ── HELPERS ──
function genId(){return'b_'+Date.now();}
function getBoardIds(){return Object.keys(allData.boards);}

function ensureDefaultBoard(){
  if(getBoardIds().length===0){
    const id=genId();
    allData.boards[id]={name:'Main Team',roster:{},inventory:{}};
  }
}

function setCurrentBoard(id){
  currentBoardId=id;
  currentBoardIndex=getBoardIds().indexOf(id);
  roster=allData.boards[id].roster;
  activeBoardNameEl.textContent=allData.boards[id].name;
}

function updateBadge() {
  if (!modeBadge) return;
  if (isViewOnly) modeBadge.textContent = 'View Only';
  else if (isDemo) modeBadge.textContent = 'Demo Mode (Local Save)';
  else modeBadge.textContent = 'Coach Mode';
}

function showMessage(text){
  const el = document.createElement('div');
  el.className = 'toast-msg';
  el.textContent = text;
  toastOverlay.innerHTML = '';
  toastOverlay.appendChild(el);
  setTimeout(() => el.classList.add('show'), 50);
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 300);
  }, 1200);
}

function graphemeCount(str){
  if(!str)return 0;
  if(typeof Intl!=='undefined'&&Intl.Segmenter)return[...new Intl.Segmenter().segment(str)].length;
  return[...str].length;
}

function limitGraphemes(str,max){
  if(!str)return'';
  if(typeof Intl!=='undefined'&&Intl.Segmenter){
    const segs=[...new Intl.Segmenter().segment(str)];
    return segs.slice(0,max).map(s=>s.segment).join('');
  }
  return[...str].slice(0,max).join('');
}

// ── DATA SYNC ──
async function loadFromCloud(){
  refreshBtn.textContent = '↻ REFRESHING';
  if (isDemo) {
    const saved = localStorage.getItem('afl_demo_data');
    if (saved) allData = JSON.parse(saved);
    else ensureDefaultBoard();
    finalizeLoad();
    syncStatus.textContent = 'local mode';
    return;
  }
  try{
    syncStatus.textContent='syncing…';
    const res=await fetch(`${JSONBIN_URL}/latest?_t=${Date.now()}`,{headers:{'X-Master-Key':API_KEY},cache:'no-store'});
    if(res.ok){
      const data=await res.json();
      allData=data.record||{boards:{}};
      isDirty=false;
      localStorage.setItem('afl_data',JSON.stringify(allData));
      syncStatus.textContent='synced';
    }
  }catch(e){
    syncStatus.textContent='offline';
    const saved=localStorage.getItem('afl_data');
    if(saved) allData=JSON.parse(saved);
  }
  finalizeLoad();
}

function finalizeLoad() {
  ensureDefaultBoard();
  const ids = getBoardIds();
  const savedCurrent = localStorage.getItem(isDemo ? 'afl_demo_current' : 'afl_current_board');
  const startId = (savedCurrent && allData.boards[savedCurrent]) ? savedCurrent : ids[0];
  setCurrentBoard(startId);
  rebuildTrack();
  renderAllBoards();
  renderBoardMenu();
  renderBoardIndicator();
  refreshBtn.textContent = '↻ REFRESH';
  startAutoRefresh();
}

function saveToCloud(){
  if (isViewOnly) return;
  allData.boards[currentBoardId].roster=roster;
  if (isDemo) {
    localStorage.setItem('afl_demo_data', JSON.stringify(allData));
    localStorage.setItem('afl_demo_current', currentBoardId);
    syncStatus.textContent = 'saved locally';
    return;
  }
  isDirty=true;
  localStorage.setItem('afl_data',JSON.stringify(allData));
  localStorage.setItem('afl_current_board',currentBoardId);
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>pushToCloud(false), 500);
}

async function pushToCloud(keepalive=false){
  saveTimer=null;
  isSaving=true;
  syncStatus.textContent='saving…';
  try{
    const res=await fetch(JSONBIN_URL,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
      body:JSON.stringify(allData),
      keepalive
    });
    if(res.ok){
      isDirty=false;
      isSaving=false;
      syncStatus.textContent='saved';
    } else {
      throw new Error('HTTP '+res.status);
    }
  }catch(e){
    isSaving=false;
    syncStatus.textContent='save failed – retrying…';
    saveTimer=setTimeout(()=>pushToCloud(false), 5000);
  }
}

// Flush any pending save when the user switches away or closes the tab.
// keepalive:true lets the browser complete the request even as the page unloads.
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden'&&(isDirty||saveTimer)){
    clearTimeout(saveTimer);
    pushToCloud(true);
  }
});

async function silentRefresh(){
  if(isDemo||isDirty||isSaving)return;
  try{
    const res=await fetch(`${JSONBIN_URL}/latest?_t=${Date.now()}`,{headers:{'X-Master-Key':API_KEY},cache:'no-store'});
    if(res.ok){
      const data=await res.json();
      allData=data.record||{boards:{}};
      localStorage.setItem('afl_data',JSON.stringify(allData));
      ensureDefaultBoard();
      if(allData.boards[currentBoardId]) roster=allData.boards[currentBoardId].roster;
      renderAllBoards();
      renderBoardMenu();
      renderBoardIndicator();
      if(inventoryOpen) renderInventory(currentBoardId);
      syncStatus.textContent='synced';
    }
  }catch(e){}
}

function startAutoRefresh(){
  clearInterval(autoRefreshInterval);
  if(isDemo)return;
  autoRefreshInterval=setInterval(()=>{
    if(!dragState&&!isDirty&&!isSaving) silentRefresh();
  },15000);
}

function toggleInventory(){
  inventoryOpen=!inventoryOpen;
  document.getElementById('inventoryPanel').classList.toggle('open',inventoryOpen);
  wrapper.style.transform=inventoryOpen?'translateY(calc(5% - 30dvh))':'translateY(5%)';
  wrapper.style.clipPath=inventoryOpen?'inset(0 0 -30dvh 0)':'inset(0 0 0 0)';
  document.querySelectorAll('.inv-arrows').forEach(el=>el.classList.toggle('open',inventoryOpen));
  renderBoardIndicator();
  if(inventoryOpen) renderInventory(currentBoardId);
}

function renderInventory(boardId){
  const panel=document.getElementById('inventoryPanel');
  panel.querySelectorAll('.inv-slot,.magnet').forEach(e=>e.remove());
  if(!allData.boards[boardId]) return;
  if(!allData.boards[boardId].inventory) allData.boards[boardId].inventory={};
  const inv=allData.boards[boardId].inventory;
  inventorySlots.forEach(s=>{
    const data=inv[s.id];
    const name=typeof data==='object'?data.name:data;
    const badge=typeof data==='object'?data.badge:'';
    const slot=document.createElement('div');
    slot.className='inv-slot'+(name?' filled':'');
    slot.style.left=s.x+'%';slot.style.top=s.y+'%';
    if(!name){
      slot.innerHTML=`<span class="pos-label">---</span>`;
      if(!isViewOnly) slot.onclick=()=>openInventoryEdit(s.id,boardId);
    }
    panel.appendChild(slot);
    if(name){
      const mag=document.createElement('div');
      mag.className='magnet is-bench';
      mag.style.left=s.x+'%';mag.style.top=s.y+'%';
      const badgeFontSize=(graphemeCount(badge||'')===1)?'15px':'11px';
      mag.innerHTML=`<div class="mag-badge" style="font-size:${badgeFontSize}">${badge||''}</div><div class="mag-name">${name}</div>`;
      if(!isViewOnly){
        mag.addEventListener('pointerdown',ev=>{
          if(!ev.isPrimary||ev.button!==0)return;
          ev.preventDefault();
          mag.setPointerCapture(ev.pointerId);
          const panelRect=panel.getBoundingClientRect();
          const groundEl=boardTrack.children[currentBoardIndex];
          const gR=groundEl.getBoundingClientRect();
          groundEl.appendChild(mag);
          dragState={
            el:mag,posId:null,invId:s.id,fromInventory:true,
            startBoardIndex:currentBoardIndex,groundEl,
            moved:false,pointerId:ev.pointerId,
            startX:ev.clientX,startY:ev.clientY,
            offX:ev.clientX-(panelRect.left+(s.x/100)*panelRect.width),
            offY:ev.clientY-(panelRect.top+(s.y/100)*panelRect.height),
            curX:((ev.clientX-gR.left)/gR.width)*100,
            curY:((ev.clientY-gR.top)/gR.height)*100,
            originalPlayerName:name,lastScrollOffset:0,
            hasLanded:false,currentLogicalIndex:currentBoardIndex,
            edgeLock:null
          };
        });
      } else { mag.style.cursor='default'; }
      panel.appendChild(mag);
    }
  });
}

function drawOval(groundEl){
  const w=groundEl.clientWidth,h=groundEl.clientHeight;
  const cx=w*0.5,cy=h*0.38,rx=w*0.46,ry=h*0.37,sq=w*0.42;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.classList.add('bg');svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
  const lineCol='rgba(255,255,255,0.3)',strokeW='3';
  const goalH = 22, behindH = 14, postGap = 12;
  svg.innerHTML=`
    <ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="none" stroke="${lineCol}" stroke-width="${strokeW}"/>
    <line x1="${cx - postGap * 1.5}" y1="${cy - ry}" x2="${cx - postGap * 1.5}" y2="${cy - ry + behindH}" stroke="${lineCol}" stroke-width="${strokeW}" />
    <line x1="${cx - postGap * 0.5}" y1="${cy - ry}" x2="${cx - postGap * 0.5}" y2="${cy - ry + goalH}" stroke="${lineCol}" stroke-width="${strokeW}" />
    <line x1="${cx + postGap * 0.5}" y1="${cy - ry}" x2="${cx + postGap * 0.5}" y2="${cy - ry + goalH}" stroke="${lineCol}" stroke-width="${strokeW}" />
    <line x1="${cx + postGap * 1.5}" y1="${cy - ry}" x2="${cx + postGap * 1.5}" y2="${cy - ry + behindH}" stroke="${lineCol}" stroke-width="${strokeW}" />
    <line x1="${cx - postGap * 1.5}" y1="${cy + ry}" x2="${cx - postGap * 1.5}" y2="${cy + ry - behindH}" stroke="${lineCol}" stroke-width="${strokeW}" />
    <line x1="${cx - postGap * 0.5}" y1="${cy + ry}" x2="${cx - postGap * 0.5}" y2="${cy + ry - goalH}" stroke="${lineCol}" stroke-width="${strokeW}" />
    <line x1="${cx + postGap * 0.5}" y1="${cy + ry}" x2="${cx + postGap * 0.5}" y2="${cy + ry - goalH}" stroke="${lineCol}" stroke-width="${strokeW}" />
    <line x1="${cx + postGap * 1.5}" y1="${cy + ry}" x2="${cx + postGap * 1.5}" y2="${cy + ry - behindH}" stroke="${lineCol}" stroke-width="${strokeW}" />
    <rect x="${cx-sq/2}" y="${cy-sq/2}" width="${sq}" height="${sq}" fill="none" stroke="${lineCol}" stroke-width="${strokeW}"/>
    <image href="https://aflnational.com/wp-content/uploads/2025/12/UNSW-Eastern-Suburbs-Bulldogs-AFL-footy-club-logo.png" x="${cx-36}" y="${cy-36}" height="72" width="72"/>
  `;
  groundEl.prepend(svg);
  const div=document.createElement('div');div.className='divider';div.style.top='76%';groundEl.appendChild(div);
  const lbl=document.createElement('div');lbl.className='zone-label';lbl.style.top='76.5%';lbl.textContent='INTERCHANGE';groundEl.appendChild(lbl);
  const emgLbl=document.createElement('div');emgLbl.className='zone-label right-aligned';emgLbl.style.top='76.5%';emgLbl.textContent='EMERGENCY';groundEl.appendChild(emgLbl);
}

function snapToBoard(index, animate = true){

  setCurrentBoard(ids[index]);

  if(inventoryOpen) renderInventory(currentBoardId);
}

// ── CARRY TRANSITION LOGIC ──
function logicalTransfer(direction) {
  if (!dragState) return;
  const ds = dragState;
  const ids = getBoardIds();
  const nextIdx = ds.currentLogicalIndex + direction;
  if (nextIdx < 0 || nextIdx >= ids.length) return;

  const prevId = ids[ds.currentLogicalIndex];
  const nextId = ids[nextIdx];
  const targetRoster = allData.boards[nextId].roster;
  let finalPosId = null;

  // Find slot on new board
  if (!targetRoster[ds.posId]) finalPosId = ds.posId;
  else {
    const emptyBench = positions.find(p => p.bench && !targetRoster[p.id]);
    if (emptyBench) finalPosId = emptyBench.id;
  }

  if (finalPosId) {
    const playerData = allData.boards[prevId].roster[ds.posId];
    delete allData.boards[prevId].roster[ds.posId];
    targetRoster[finalPosId] = playerData;
    
    // Reparent visually
    ds.groundEl = boardTrack.children[nextIdx];
    ds.groundEl.appendChild(ds.el);

    // Update logical tracking
    ds.currentLogicalIndex = nextIdx;
    ds.posId = finalPosId;
    currentBoardId = nextId;
    currentBoardIndex = nextIdx;
    roster = targetRoster;
    
    // Update UI elements
    activeBoardNameEl.textContent = allData.boards[nextId].name;
    renderBoardIndicator();
    saveToCloud();
  }
}

const onMove=e=>{
  if(!dragState||dragState.pointerId!==e.pointerId)return;
  
  const dx=e.clientX-dragState.startX,dy=e.clientY-dragState.startY;
  if(!dragState.moved&&(dx*dx+dy*dy > 64)) dragState.moved=true;
  
  if(dragState.moved){
    const wRect = wrapper.getBoundingClientRect();
    const W = wRect.width;
    const triggerZone = W * 0.16; // 16% from screen edge: triggers the slide
    const slideTravel = W * 0.10; // 10% of screen: travel distance to complete the slide
    const ids = getBoardIds();
    
    // ── PROPORTIONAL SCROLLING ──
    let proportionalOffset = 0;
    let transferTriggered = false;

    const hasNext = dragState.currentLogicalIndex < ids.length - 1;
    const hasPrev = dragState.currentLogicalIndex > 0;
    let depth = 0;
    let direction = 0;

    if (e.clientX > wRect.right - triggerZone) {
      depth = (e.clientX - (wRect.right - triggerZone)) / slideTravel;
      direction = 1;
    } else if (e.clientX < wRect.left + triggerZone) {
      depth = ((wRect.left + triggerZone) - e.clientX) / slideTravel;
      direction = -1;
    }

    // Reset lock once user brings magnet back towards the center
    if (depth <= 0) dragState.edgeLock = null;

    // Apply scroll if a board exists in that direction, and we aren't locked
    if (direction === 1 && hasNext && dragState.edgeLock !== 'right') {
      const cappedDepth = Math.min(1.0, Math.max(0, depth));
      proportionalOffset = -cappedDepth * W;
      if (cappedDepth >= 1.0) {
        transferTriggered = 1;
        dragState.edgeLock = 'right'; // lock this edge so we stop scrolling
      }
    } else if (direction === -1 && hasPrev && dragState.edgeLock !== 'left') {
      const cappedDepth = Math.min(1.0, Math.max(0, depth));
      proportionalOffset = cappedDepth * W;
      if (cappedDepth >= 1.0) {
        transferTriggered = -1;
        dragState.edgeLock = 'left';
      }
    }

    // If we transition to a new board, instantly reset offset so index natively handles it
    if (transferTriggered !== false) {
      logicalTransfer(transferTriggered);
      proportionalOffset = 0; 
    }

    // Apply Track Position
    boardTrack.style.transition = 'none';
    boardTrack.style.transform = `translateX(${-dragState.currentLogicalIndex * W + proportionalOffset}px)`;

    // ── POSITION MAGNET ──
    // Visual Origin is wherever the logically centered board currently is on screen
    const boardVisualOriginX = wRect.left + proportionalOffset;
    const x = ((e.clientX - dragState.offX - boardVisualOriginX) / W) * 100;
    const y = ((e.clientY - dragState.offY - wRect.top) / wRect.height) * 100;
    
    dragState.curX = x;
    dragState.curY = y;
    dragState.el.style.left = x + '%';
    dragState.el.style.top = y + '%';
  }
};

const onEnd=e=>{
  if(!dragState||dragState.pointerId!==e.pointerId)return;
  dragState.el.releasePointerCapture(e.pointerId);
  const ds=dragState;
  dragState=null;

  if(!ds.moved){
    suppressClick = true;
    setTimeout(() => suppressClick = false, 350);
    if(ds.fromInventory){ renderInventory(currentBoardId); openInventoryEdit(ds.invId,currentBoardId); }
    else openEdit(ds.posId,currentBoardId);
    return;
  }

  snapToBoard(currentBoardIndex,true);

  // ── DROP INTO INVENTORY ──
  if(inventoryOpen){
    const panel=document.getElementById('inventoryPanel');
    const panelRect=panel.getBoundingClientRect();
    if(e.clientY>=panelRect.top&&e.clientY<=panelRect.bottom){
      const relX=((e.clientX-panelRect.left)/panelRect.width)*100;
      const relY=((e.clientY-panelRect.top)/panelRect.height)*100;
      let bestInv=null,bestInvD=Infinity;
      inventorySlots.forEach(s=>{
        const d=(relX-s.x)**2+(relY-s.y)**2;
        if(d<bestInvD){bestInvD=d;bestInv=s;}
      });
      if(bestInv){
        if(!allData.boards[currentBoardId].inventory) allData.boards[currentBoardId].inventory={};
        const inv=allData.boards[currentBoardId].inventory;
        const playerData=ds.fromInventory?inv[ds.invId]:allData.boards[currentBoardId].roster[ds.posId];
        if(ds.fromInventory) delete inv[ds.invId];
        else delete allData.boards[currentBoardId].roster[ds.posId];
        // Swap if target occupied
        if(inv[bestInv.id]){
          if(ds.fromInventory) inv[ds.invId]=inv[bestInv.id];
          else allData.boards[currentBoardId].roster[ds.posId]=inv[bestInv.id];
        }
        inv[bestInv.id]=playerData;
        saveToCloud(); renderAllBoards(); renderInventory(currentBoardId);
        return;
      }
    }
  }

  // ── DROP ON FIELD (including from inventory) ──
  let best=null,bd=Infinity;
  const snapX=Math.max(0,Math.min(100,ds.curX));
  positions.forEach(p=>{
    const ddx=snapX-p.x,ddy=ds.curY-p.y,d=ddx*ddx+ddy*ddy;
    if(d<bd){bd=d;best=p;}
  });

  if(ds.fromInventory){
    if(best&&bd<500){
      if(!allData.boards[currentBoardId].inventory) allData.boards[currentBoardId].inventory={};
      const inv=allData.boards[currentBoardId].inventory;
      const playerData=inv[ds.invId];
      delete inv[ds.invId];
      // Swap with existing field player back to inventory
      if(allData.boards[currentBoardId].roster[best.id]) inv[ds.invId]=allData.boards[currentBoardId].roster[best.id];
      allData.boards[currentBoardId].roster[best.id]=playerData;
      saveToCloud(); renderAllBoards(); renderInventory(currentBoardId);
    } else {
      // No valid snap — return to inventory
      renderInventory(currentBoardId);
    }
    return;
  }

  if(best&&bd<500){
    const dData=allData.boards[currentBoardId].roster[ds.posId];
    if(allData.boards[currentBoardId].roster[best.id]){
      allData.boards[currentBoardId].roster[ds.posId]=allData.boards[currentBoardId].roster[best.id];
    } else {
      delete allData.boards[currentBoardId].roster[ds.posId];
    }
    allData.boards[currentBoardId].roster[best.id]=dData;
  }
  saveToCloud(); renderAllBoards();
};

document.onpointermove=onMove; document.onpointerup=onEnd;

// Close inventory when tapping empty playing surface (pointerdown so it doesn't
// interfere with drags — magnet pointerdown is excluded so dragging stays open)
document.addEventListener('pointerdown',e=>{
  if(!inventoryOpen) return;
  if(e.target.closest('#inventoryPanel')) return;
  if(e.target.closest('.inv-arrows')) return;
  if(e.target.closest('.magnet')) return;
  if(e.target.closest('.pos-slot')) return;
  if(e.target.closest('#editOverlay')) return;
  if(e.target.closest('#boardMenu')) return;
  toggleInventory();
},{passive:true});

// ── EDITING ──
function openEdit(posId,boardId){
  if (isViewOnly) return;
  editingPosId={posId,boardId};
  const data=allData.boards[boardId]?.roster[posId];
  const posLabel = positions.find(x=>x.id===posId).label;
  editTitle.textContent=posLabel;
  editInput.value=typeof data==='object'?data.name:(data||'');
  badgeInput.value=typeof data==='object'?data.badge:'';
  overlay.classList.add('show'); setTimeout(()=>{editInput.focus();editInput.select();},50);
}

function closeEdit(){overlay.classList.remove('show'); editingPosId=null;}
editSave.addEventListener('click', e => {
  if(suppressClick && e.isTrusted) return;
  if(!editingPosId)return;
  const {posId,boardId,isInventory}=editingPosId;
  const name=editInput.value.trim(),badge=limitGraphemes(badgeInput.value.trim(),2);
  if(isInventory){
    if(!allData.boards[boardId].inventory) allData.boards[boardId].inventory={};
    if(name) allData.boards[boardId].inventory[posId]={name,badge};
    else delete allData.boards[boardId].inventory[posId];
    saveToCloud(); renderInventory(boardId);
  } else {
    const r=allData.boards[boardId].roster;
    if(name)r[posId]={name,badge}; else delete r[posId];
    saveToCloud(); renderBoard(boardId,boardTrack.children[getBoardIds().indexOf(boardId)]);
  }
  closeEdit();
});
editClear.addEventListener('click', e => {
  if(suppressClick && e.isTrusted) return;
  if(!editingPosId)return;
  const {posId,boardId,isInventory}=editingPosId;
  if(isInventory){
    if(allData.boards[boardId].inventory) delete allData.boards[boardId].inventory[posId];
    saveToCloud(); renderInventory(boardId);
  } else {
    delete allData.boards[boardId].roster[posId];
    saveToCloud(); renderBoard(boardId,boardTrack.children[getBoardIds().indexOf(boardId)]);
  }
  closeEdit();
});
editCancel.addEventListener('click', e => {
  if(suppressClick && e.isTrusted) return;
  closeEdit();
});
editInput.addEventListener('keydown',e=>{if(e.key==='Enter')editSave.click();});
refreshBtn.addEventListener('click',loadFromCloud);
window.addEventListener('resize',()=>{rebuildTrack(); renderAllBoards();});

function switchBoard(id){
  const idx=getBoardIds().indexOf(id);
  snapToBoard(idx);
  closeBoardMenu();
}

function createBoard(name){
  if (isViewOnly) return;
  const id=genId();
  allData.boards[id]={name:name.trim(),roster:{},inventory:{}};
  rebuildTrack();
  renderAllBoards();
  saveToCloud();
  switchBoard(id);
}

// ── SWIPE GESTURE ──
let trackSwipeState=null;
wrapper.addEventListener('pointerdown',e=>{
  if(dragState||e.target.closest('.magnet')||e.target.closest('.pos-slot')) return;
  trackSwipeState={startX:e.clientX,lastX:e.clientX,pointerId:e.pointerId,baseX:-currentBoardIndex*wrapper.clientWidth,startTime:Date.now()};
  boardTrack.style.transition='none';
},{passive:true});

wrapper.addEventListener('pointermove',e=>{
  if(!trackSwipeState||trackSwipeState.pointerId!==e.pointerId)return;
  const dx=e.clientX-trackSwipeState.startX;
  const ids=getBoardIds();
  const w=wrapper.clientWidth;
  let x=trackSwipeState.baseX+dx;
  if(x>0) x=x*0.25;
  if(x<-(ids.length-1)*w) x=-(ids.length-1)*w+(x+(ids.length-1)*w)*0.25;
  boardTrack.style.transform=`translateX(${x}px)`;
  trackSwipeState.lastX=e.clientX;
},{passive:true});

wrapper.addEventListener('pointerup',e=>{
  if(!trackSwipeState||trackSwipeState.pointerId!==e.pointerId)return;
  const sw=trackSwipeState; trackSwipeState=null;
  const dx=e.clientX-sw.startX;
  const dt=Date.now()-sw.startTime;
  const velocity=dx/dt; 
  const w=wrapper.clientWidth;
  let targetIndex=currentBoardIndex;
  if(Math.abs(dx)>w*0.3||Math.abs(velocity)>0.4){
    if(dx<0) targetIndex++;
    else targetIndex--;
  }
  suppressClick=true; setTimeout(()=>suppressClick=false,100);
  snapToBoard(targetIndex);
},{passive:true});

menuBtn.addEventListener('click',openBoardMenu);
boardMenuOverlay.addEventListener('click',closeBoardMenu);
createBoardBtn.addEventListener('click',()=>{
  newBoardForm.classList.toggle('show');
  if(newBoardForm.classList.contains('show'))setTimeout(()=>newBoardInput.focus(),50);
});
newBoardConfirm.addEventListener('click',()=>{const n=newBoardInput.value.trim();if(n)createBoard(n);});
newBoardInput.addEventListener('keydown',e=>{if(e.key==='Enter'){const n=newBoardInput.value.trim();if(n)createBoard(n);}});

// ── INIT ──
function init() {
  if (isNoUI) document.body.classList.add('no-ui');
  updateBadge();
  if (isEdit && localStorage.getItem('afl_coach_verified') !== 'true') {
    pwOverlay.classList.add('show');
    pwInput.focus();
  } else {
    loadFromCloud();
  }
}

pwSubmit.onclick = () => {
  if (pwInput.value === 'Yadz') {
    localStorage.setItem('afl_coach_verified', 'true');
    pwOverlay.classList.remove('show'); 
    loadFromCloud();
  } else {
    showMessage("INCORRECT PASSWORD");
    isEdit = false; isViewOnly = true;
    pwOverlay.classList.remove('show'); updateBadge(); loadFromCloud();
  }
};
pwInput.onkeydown = e => { if(e.key === 'Enter') pwSubmit.onclick(); };

init();
</script>
